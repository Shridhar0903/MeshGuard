<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .footer-wire{
    background:#3f4a63; /* similar to wireframe */
    color:#fff;
    font-family:'Poppins', sans-serif;
}

/* TOP BAR */
.footer-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 60px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* LEFT */
.footer-left{
    display:flex;
    gap:25px;
    font-size:14px;
    color:#cbd5e1;
   
}

.footer-left i{
    margin-right:8px;
       font-family: var(--font-body);
}

/* LOGO */
.footer-logo h2{
    font-family:'Montserrat', sans-serif;
    font-size:22px;
    letter-spacing:2px;
}

.footer-logo span{
    color:#e98d0c;
}

/* SOCIAL */
.footer-social{
    display:flex;
    gap:15px;
}

.footer-social a{
    width:35px;
    height:35px;
    border:1px solid #fff;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    transition:0.3s;
}

.footer-social a:hover{
    background:#e98d0c;
    border-color:#e98d0c;
}

/* BOTTOM NAV */
.footer-bottom{
    text-align:center;
    padding:15px 0;
}

.footer-bottom ul{
    list-style:none;
    display:flex;
    justify-content:center;
    gap:40px;
}

.footer-bottom ul li a{
    text-decoration:none;
    color:#cbd5e1;
    font-size:14px;
    transition:0.3s;
}

.footer-bottom ul li a:hover{
    color:#e98d0c;
}
    </style>

    <footer class="footer-wire">

    <!-- TOP BAR -->
    <div class="footer-top">
        <div class="footer-left">
            <span><i class="fas fa-envelope"></i> info@meshguard.com</span>
            <span><i class="fas fa-phone"></i> +91 98765 43210</span>
        </div>

        <div class="footer-logo">
            <h2>MESH<span>GUARD</span></h2>
        </div>

        <div class="footer-social">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="footer-bottom">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Service</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>

</footer>
    
</body>
</html>
